<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/three.js"></script>
    <script src="js/OrbitControls.js"></script>
    <script src="js/OBJLoader.js"></script>
    <script src="js/MTLLoader.js"></script>
    <script src="js/dat.gui.min.js"></script>
    <link rel="stylesheet" href="css/layout.css" />
    <title>Chess</title>
  </head>

  <body>
    <div id="info">
      <h1>Chess Game</h1>
      <p id="status" style="margin:4px 0 0; font-size:14px; font-family:sans-serif;">Loading…</p>
    </div>
    <div
      id="menu"
      style="position: absolute; top: 10px; right: 10px; z-index: 10"
    ></div>
    <script type="x-shader/x-vertex" id="vertexShader">
      attribute float alpha; varying float vAlpha; void main() { vAlpha = alpha; vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 ); gl_PointSize = 2.0; gl_Position = projectionMatrix * mvPosition; }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
      uniform vec3 color; varying float vAlpha; void main() { gl_FragColor = vec4( color, vAlpha ); }
    </script>
    <script src="src/engine.js"></script>
    <script src="src/ai.js"></script>
    <script src="src/setup.js"></script>
    <script src="src/build.js"></script>
    <script src="src/animate.js"></script>
    <script src="src/game.js"></script>
    <script src="src/interaction.js"></script>
    <script src="src/run.js"></script>
    <script src="src/controls.js"></script>
  </body>
</html>
